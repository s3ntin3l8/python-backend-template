# Blueprint: Standard Python Pre-commit Config
repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy . --ignore-missing-imports
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-unit
        name: pytest (unit tests)
        entry: .venv/bin/pytest tests/unit/ -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest-all
        name: pytest (all tests)
        entry: .venv/bin/pytest -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
